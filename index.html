<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShakeME</title>

    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">

    <!-- QR + Scanner -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

    <script src="app.js" defer></script>
</head>

<body>

<div class="bg-glow"></div>

<!-- 🔥 iPhone Frame -->
<div class="iphone-frame">

    <!-- Status Bar -->
    <div class="status-bar">
        <span>9:41</span>
        <span>📶 📡 🔋</span>
    </div>

    <div class="container">

        <!-- HEADER -->
        <div class="header">
            <div class="logo">ShakeME</div>
            <div class="tagline">Premium Networking</div>
        </div>

        <!-- HOME SCREEN -->
        <div id="home" class="screen active">
            <p class="instruction">Choose how you want to share</p>

            <div class="mode-grid">
                <div class="mode-btn shake" onclick="startMode('shake')">
                    🤝<br>Shake Me
                </div>
                <div class="mode-btn hug" onclick="startMode('hug')">
                    🫂<br>Hug Me
                </div>
            </div>

            <div class="btn-group">
                <button class="btn btn-primary" onclick="installApp()">Install App</button>
            </div>
        </div>

        <!-- FORM SCREEN -->
        <div id="form" class="screen">

            <div class="glass-card">

                <div class="form-group">
                    <label>Name *</label>
                    <input id="name" placeholder="John Doe">
                </div>

                <div class="form-group">
                    <label>WhatsApp *</label>
                    <div class="phone-row">
                        <select id="countryCode">
                            <option value="+234">+234</option>
                            <option value="+1">+1</option>
                        </select>
                        <input id="phone" placeholder="8012345678">
                    </div>
                </div>

                <div class="form-group">
                    <label>Role *</label>
                    <input id="role" placeholder="Designer">
                </div>

                <!-- HUG ONLY -->
                <div id="hugFields" class="hidden">

                    <div class="form-group">
                        <label>LinkedIn</label>
                        <input id="linkedin" placeholder="https://linkedin.com/in/username">
                    </div>

                    <div class="form-group">
                        <label>Status</label>
                        <select id="status">
                            <option>Open to Work</option>
                            <option>Hiring</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>About</label>
                        <textarea id="about" maxlength="50" placeholder="A short bio..."></textarea>
                    </div>

                </div>

            </div>

            <div class="btn-group">
                <button class="btn btn-primary" onclick="generateQR()">Generate QR</button>
                <button class="btn btn-dark" onclick="goHome()">Back</button>
            </div>

        </div>

        <!-- QR SCREEN -->
        <div id="qrScreen" class="screen">

            <div class="premium-card">
                <h3 id="displayName"></h3>
                <p id="displayRole"></p>

                <div id="qrcode"></div>

                <p class="qr-text">Scan once. Connect instantly.</p>

                <div class="btn-group">
                    <button class="btn btn-dark" onclick="copyQRLink()">Copy QR Link</button>
                    <button class="btn btn-dark" onclick="goHome(); showConnectedToast(currentMode)">Done</button>
                </div>
            </div>

        </div>

        <!-- PROFILE SCREEN -->
        <div id="profileScreen" class="screen">

            <div class="premium-card">

                <h2 id="viewName"></h2>
                <p id="viewRole"></p>
                <p id="viewStatus" class="hidden"></p>

                <div id="viewAboutSection" class="hidden">
                    <p id="viewAbout"></p>
                </div>

                <!-- PROFILE BUTTONS FLEX ROW -->
                <div class="profile-btns">
                    <a id="whatsappBtn" class="btn btn-primary" target="_blank">WhatsApp</a>
                    <a id="linkedinBtn" class="btn btn-dark hidden" target="_blank">LinkedIn</a>
                    <button class="btn btn-dark" onclick="saveContact()">Save Contact</button>
                </div>

            </div>

        </div>

    </div>
</div>

</body>
</html>
